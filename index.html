<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reginagostadehomens.com</title>

<style>

body{
    background:black;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    position:relative;
}

h1{
    margin-bottom:20px;
}

.buttons{
    position:relative;
    height:80px;
}

button,a{
    padding:12px 22px;
    font-size:16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#joao{
    background:#ff4d6d;
    color:black;
}

#regina{
    position:absolute;
    left:150px;
    top:0;
    background:#333;
    color:white;
}

</style>
</head>

<body>

<div class="container">

<h1>reginagostadehomens.com</h1>

<h2>Quem ama mais?</h2>

<div class="buttons">

<a id="joao" href="https://www.youtube.com/shorts/JwtOuNhjV7E" target="_blank">
João
</a>

<button id="regina">
Regina feia boboca
</button>

</div>

<audio id="som">
<source src="Zé da Manga - Sound Effects BR [t3-ldLXBNsg].mp3" type="audio/mpeg">
</audio>

</div>

<script>

const regina = document.getElementById("regina")
const som = document.getElementById("som")

regina.addEventListener("mouseover", fugir)

function fugir(){

    som.currentTime = 0
    som.play()

    const largura = window.innerWidth - regina.offsetWidth
    const altura = window.innerHeight - regina.offsetHeight

    const x = Math.random() * largura
    const y = Math.random() * altura

    regina.style.left = x + "px"
    regina.style.top = y + "px"
}

</script>

</body>
</html>
