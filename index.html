<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>reginagostadehomens.com</title>
  <style>
    :root{
      --bg: #000;
      --text: #fff;
      --accent: #ff4d6d;
      --muted: rgba(255,255,255,0.15);
      --btn-padding: 12px 20px;
      --btn-radius: 12px;
      --max-width: 920px;
    }

    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
      box-sizing:border-box;
    }

    .card{
      width:100%;
      max-width:var(--max-width);
      text-align:center;
      padding:36px;
      box-sizing:border-box;
      border-radius:12px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    header h1{
      margin:0 0 18px 0;
      font-size: clamp(20px, 3.8vw, 36px);
      letter-spacing: 0.6px;
      color:var(--text);
      opacity:0.98;
    }

    .question{
      margin:6px 0 26px 0;
      font-size: clamp(18px, 2.6vw, 26px);
      color:var(--muted);
    }

    .choices{
      display:flex;
      gap:18px;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
      position:relative; /* regina btn absolute relative to esta área */
      min-height:120px;
      padding:22px 14px;
    }

    a.btn, button.btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border: none;
      cursor: pointer;
      text-decoration:none;
      color:var(--bg);
      background:var(--accent);
      padding:var(--btn-padding);
      border-radius:var(--btn-radius);
      font-weight:600;
      font-size:16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.45);
      transition: transform 180ms cubic-bezier(.2,.9,.3,1), box-shadow 160ms;
      user-select:none;
    }
    a.btn:active, button.btn:active { transform: translateY(1px) scale(0.995); }

    /* Regina button will be absolutely positioned inside .choices */
    #reginaBtn{
      position:absolute;
      min-width:180px;
      padding:10px 14px;
      background:transparent;
      color:var(--text);
      border:2px solid rgba(255,255,255,0.06);
      background-image: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:var(--btn-radius);
      z-index:30;
      white-space:nowrap;
      transition: left 420ms cubic-bezier(.2,.9,.3,1), top 420ms, transform 260ms;
    }

    .static-area{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
      min-width:220px;
      z-index:10;
    }

    footer{
      margin-top:22px;
      font-size:12px;
      color:rgba(255,255,255,0.10);
      min-height:18px;
    }

    @media (max-width:600px){
      .card{ padding:20px; }
      #reginaBtn{ min-width:140px; padding:8px 12px; font-size:14px; }
      a.btn{ padding:10px 14px; font-size:15px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="card" role="main" aria-labelledby="siteTitle">
      <header>
        <h1 id="siteTitle">reginagostadehomens.com</h1>
      </header>

      <p class="question"><strong>Quem ama mais?</strong></p>

      <div class="choices" id="choicesArea" aria-live="polite">
        <div class="static-area" id="leftArea">
          <a class="btn" id="joaoBtn" href="https://www.youtube.com/shorts/JwtOuNhjV7E" target="_blank" rel="noopener noreferrer" aria-label="João">
            João
          </a>
        </div>

        <button class="btn" id="reginaBtn" aria-label="Regina feia boboca">
          Regina feia boboca
        </button>
      </div>

      <footer></footer>

      <!-- Audio: coloque o arquivo na mesma pasta do HTML com esse nome -->
      <audio id="teleportSound" preload="auto">
        <source src="Zé da Manga - Sound Effects BR [t3-ldLXBNsg].mp3" type="audio/mpeg">
      </audio>
    </main>
  </div>

  <script>
    (function(){
      const regBtn = document.getElementById('reginaBtn');
      const area = document.getElementById('choicesArea');
      const audio = document.getElementById('teleportSound');

      // posiciona o botão REGINA dentro da área (coordenadas relativas à área)
      function placeInitial(){
        const areaRect = area.getBoundingClientRect();
        const w = area.clientWidth;
        const h = area.clientHeight;

        // coloca num ponto relativo dentro da área (72% da largura, centrado vertical)
        const left = Math.max(8, Math.floor(w * 0.72));
        const top = Math.max(8, Math.floor((h - regBtn.offsetHeight) / 2));

        regBtn.style.left = left + 'px';
        regBtn.style.top  = top + 'px';
      }

      // Gera posição aleatória dentro da área garantindo distância do ponto (cx,cy) (client coords)
      function randomPositionAwayInArea(cx, cy, elWidth, elHeight){
        const areaRect = area.getBoundingClientRect();
        const padding = 8;
        const areaLeft = areaRect.left;
        const areaTop  = areaRect.top;
        const areaW = areaRect.width;
        const areaH = areaRect.height;

        // converte cursor coords para coords relativas à área
        const relCx = cx - areaLeft;
        const relCy = cy - areaTop;

        const minDist = Math.max(160, Math.min(areaW, areaH) * 0.22);

        for(let tries=0; tries<80; tries++){
          const left = Math.floor(Math.random() * (areaW - elWidth - padding*2)) + padding;
          const top  = Math.floor(Math.random() * (areaH - elHeight - padding*2)) + padding;

          const dx = (left + elWidth/2) - relCx;
          const dy = (top + elHeight/2) - relCy;
          const dist = Math.hypot(dx,dy);

          if(dist >= minDist){
            return {left, top};
          }
        }

        // fallback: joga pro canto oposto relativo ao cursor
        const fallbackLeft = relCx < areaW/2 ? areaW - elWidth - padding : padding;
        const fallbackTop  = relCy < areaH/2 ? areaH - elHeight - padding : padding;
        return {left: fallbackLeft, top: fallbackTop};
      }

      function playTeleportSound(){
        if(!audio) return;
        audio.currentTime = 0;
        const p = audio.play();
        if(p && p.catch) p.catch(()=>{});
      }

      function tryVibrate(){
        try{ if(navigator.vibrate) navigator.vibrate([30,20,40]); }catch(e){}
      }

      function teleportAway(clientX = window.innerWidth/2, clientY = window.innerHeight/2){
        const rect = regBtn.getBoundingClientRect();
        const elW = rect.width;
        const elH = rect.height;
        const pos = randomPositionAwayInArea(clientX, clientY, elW, elH);

        // aplica posição relativa dentro da área
        regBtn.style.left = pos.left + 'px';
        regBtn.style.top  = pos.top + 'px';
      }

      // evita ativação normal: ao tentar pressionar, teleporta e toca som
      regBtn.addEventListener('pointerdown', function(evt){
        evt.preventDefault();
        evt.stopPropagation();
        playTeleportSound();
        tryVibrate();
        teleportAway(evt.clientX, evt.clientY);
        regBtn.blur();
      }, {passive:false});

      // Se o cursor se aproximar demais, a Regina se afasta
      area.addEventListener('mousemove', function(evt){
        const r = regBtn.getBoundingClientRect();
        const dx = evt.clientX - (r.left + r.width/2);
        const dy = evt.clientY - (r.top  + r.height/2);
        const dist = Math.hypot(dx,dy);

        if(dist < Math.max(110, Math.min(area.clientWidth, area.clientHeight) * 0.12)){
          playTeleportSound();
          teleportAway(evt.clientX, evt.clientY);
        }
      }, {passive:true});

      // Touch devices
      area.addEventListener('touchstart', function(evt){
        if(!evt.touches || evt.touches.length===0) return;
        const t = evt.touches[0];
        const r = regBtn.getBoundingClientRect();
        const dx = t.clientX - (r.left + r.width/2);
        const dy = t.clientY - (r.top  + r.height/2);
        const dist = Math.hypot(dx,dy);
        if(dist < 160){
          playTeleportSound();
          teleportAway(t.clientX, t.clientY);
          tryVibrate();
        }
      }, {passive:true});

      // teclado: evita ativação e teleporta
      regBtn.addEventListener('keydown', function(evt){
        if(evt.key === 'Enter' || evt.key === ' '){
          evt.preventDefault();
          playTeleportSound();
          teleportAway(window.innerWidth/2, window.innerHeight/2);
        }
      });

      // evita drag
      regBtn.addEventListener('dragstart', e => e.preventDefault());

      // reposiciona ao redimensionar (ajusta para o novo tamanho da área)
      window.addEventListener('resize', function(){
        setTimeout(placeInitial, 120);
      });

      window.addEventListener('load', function(){
        // aguarda pequeno delay pra garantir medidas corretas
        setTimeout(placeInitial, 40);
      });
    })();
  </script>
</body>
</html>
